<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ההימור 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@400;500;700;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Boot safety net: if the app bundle fails to parse/run (e.g. an old mobile
      // browser that can't handle the JS, or a stale/partial asset), React never
      // mounts and the user just sees a blank page. Capture the error and, if
      // #root is still empty shortly after load, show a readable message + reload
      // instead of nothing. Harmless when the app boots normally.
      (function () {
        var lastError = '';
        function record(msg) { if (msg && !lastError) lastError = String(msg); }
        window.addEventListener('error', function (e) {
          record((e && e.error && e.error.stack) || (e && e.message) || 'script load error');
        }, true);
        window.addEventListener('unhandledrejection', function (e) {
          var r = e && e.reason;
          record((r && (r.stack || r.message)) || r || 'unhandled rejection');
        });
        function showFallback() {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) return;
          if (document.getElementById('boot-fallback')) return;
          var wrap = document.createElement('div');
          wrap.id = 'boot-fallback';
          wrap.setAttribute('dir', 'rtl');
          wrap.style.cssText = 'font-family:Heebo,Arial,sans-serif;max-width:560px;margin:40px auto;padding:24px;text-align:center;color:#222';
          var h = document.createElement('h2');
          h.style.cssText = 'margin:0 0 8px'; h.textContent = 'לא הצלחנו לטעון את האפליקציה';
          var p = document.createElement('p');
          p.style.cssText = 'margin:0 0 16px;color:#555'; p.textContent = 'נסו לרענן. אם זה חוזר — צלמו מסך של ההודעה למטה ושלחו.';
          var btn = document.createElement('button');
          btn.style.cssText = 'font-size:16px;padding:10px 18px;border:0;border-radius:8px;background:#1a73e8;color:#fff';
          btn.textContent = 'רענון';
          btn.addEventListener('click', function () { location.reload(); });
          var pre = document.createElement('pre');
          pre.style.cssText = 'white-space:pre-wrap;text-align:left;direction:ltr;background:#f4f4f4;padding:10px;border-radius:8px;margin-top:16px;font-size:12px;color:#900;overflow:auto';
          pre.textContent = (lastError || 'unknown error') + '\n\n' + navigator.userAgent;
          wrap.appendChild(h); wrap.appendChild(p); wrap.appendChild(btn); wrap.appendChild(pre);
          document.body.appendChild(wrap);
        }
        window.addEventListener('load', function () { setTimeout(showFallback, 6000); });
        setTimeout(showFallback, 10000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
